{% extends 'dashboard/base.html' %}
{% load i18n %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-8 text-center">
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
            <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
            </svg>
        </div>
        <h2 class="text-xl font-bold text-gray-900 mb-2">{% trans "Delete Project" %}</h2>
        <p class="text-gray-600 mb-6">
            {% blocktrans with title=project.title %}
            Are you sure you want to delete "{{ title }}"? This action cannot be undone.
            {% endblocktrans %}
        </p>
        <form method="post" class="flex justify-center gap-3">
            {% csrf_token %}
            <a href="{% url 'dashboard:project_list' %}" class="px-4 py-2 text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                {% trans "Cancel" %}
            </a>
            <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                {% trans "Delete" %}
            </button>
        </form>
    </div>
</div>
{% endblock %}
