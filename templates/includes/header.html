{% load i18n %}
<header class="fixed w-full top-0 z-50 transition-all duration-300"
        :class="scrolled ? 'bg-white/95 backdrop-blur-md shadow-soft' : 'bg-transparent'">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16 lg:h-20">
            <!-- Logo -->
            <a href="{% url 'core:home' %}" class="flex items-center space-x-2 rtl:space-x-reverse">
                {% if site_settings.logo %}
                <img src="{{ site_settings.logo.url }}" alt="{{ site_settings.site_name }}" class="h-10 w-auto">
                {% else %}
                <span class="text-2xl font-bold gradient-text">DigiCode</span>
                {% endif %}
            </a>
            
            <!-- Desktop Navigation -->
            <nav class="hidden lg:flex items-center space-x-8 rtl:space-x-reverse">
                <a href="{% url 'core:home' %}" class="text-sm font-medium hover:text-accent transition-colors">
                    {% trans "Home" %}
                </a>
                <a href="{% url 'services:list' %}" class="text-sm font-medium hover:text-accent transition-colors">
                    {% trans "Services" %}
                </a>
                <a href="{% url 'core:about' %}" class="text-sm font-medium hover:text-accent transition-colors">
                    {% trans "About" %}
                </a>
                <a href="{% url 'core:contact' %}" class="text-sm font-medium hover:text-accent transition-colors">
                    {% trans "Contact" %}
                </a>
            </nav>
            
            <!-- Right Side: Language + CTA -->
            <div class="hidden lg:flex items-center space-x-4 rtl:space-x-reverse">
                <!-- Language Switcher -->
                <div class="relative" x-data="{ open: false }">
                    <button @click="open = !open" class="flex items-center space-x-1 rtl:space-x-reverse text-sm font-medium">
                        <span>{{ CURRENT_LANGUAGE|upper }}</span>
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    <div x-show="open" @click.away="open = false"
                         x-transition:enter="transition ease-out duration-200"
                         x-transition:enter-start="opacity-0 scale-95"
                         x-transition:enter-end="opacity-100 scale-100"
                         class="absolute right-0 rtl:right-auto rtl:left-0 mt-2 w-32 bg-white rounded-lg shadow-medium py-2 z-50">
                        <a href="{% url 'core:set_language' lang='fr' %}" 
                           class="block px-4 py-2 text-sm hover:bg-gray-50 {% if CURRENT_LANGUAGE == 'fr' %}text-accent font-medium{% endif %}">
                            Français
                        </a>
                        <a href="{% url 'core:set_language' lang='ar' %}" 
                           class="block px-4 py-2 text-sm hover:bg-gray-50 {% if CURRENT_LANGUAGE == 'ar' %}text-accent font-medium{% endif %}">
                            العربية
                        </a>
                    </div>
                </div>
                
                <!-- CTA Button -->
                <a href="https://wa.me/{{ site_settings.whatsapp_number|cut:'+' }}" 
                   target="_blank"
                   class="inline-flex items-center px-4 py-2 bg-accent text-white rounded-lg text-sm font-medium btn-hover">
                    <svg class="w-4 h-4 mr-2 rtl:mr-0 rtl:ml-2" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.13 1.58 5.929L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.35-8.413"/>
                    </svg>
                    {% trans "Get Quote" %}
                </a>
            </div>
            
            <!-- Mobile Menu Button -->
            <button @click="mobileMenu = !mobileMenu" class="lg:hidden p-2">
                <svg x-show="!mobileMenu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
                <svg x-show="mobileMenu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Mobile Menu -->
    <div x-show="mobileMenu" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         class="lg:hidden bg-white border-t">
        <div class="px-4 py-4 space-y-3">
            <a href="{% url 'core:home' %}" class="block py-2 text-base font-medium">{% trans "Home" %}</a>
            <a href="{% url 'services:list' %}" class="block py-2 text-base font-medium">{% trans "Services" %}</a>
            <a href="{% url 'core:about' %}" class="block py-2 text-base font-medium">{% trans "About" %}</a>
            <a href="{% url 'core:contact' %}" class="block py-2 text-base font-medium">{% trans "Contact" %}</a>
            <div class="pt-3 border-t flex items-center space-x-4 rtl:space-x-reverse">
                <a href="{% url 'core:set_language' lang='fr' %}" 
                   class="{% if CURRENT_LANGUAGE == 'fr' %}text-accent font-medium{% endif %}">FR</a>
                <a href="{% url 'core:set_language' lang='ar' %}" 
                   class="{% if CURRENT_LANGUAGE == 'ar' %}text-accent font-medium{% endif %}">AR</a>
            </div>
        </div>
    </div>
</header>
